name: Deploy Prod

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS (Prod)
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Projects/dansar-backend
            git pull origin main
            docker compose -f docker-compose.yml --project-name dansar-backend up -d --build --force-recreate
            docker compose -f docker-compose.yml --project-name dansar-backend exec -T backend alembic upgrade head
            docker image prune -f
            echo "Prod deploy done"
