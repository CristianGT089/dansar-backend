name: Deploy QA

on:
  push:
    branches: [develop]

jobs:
  deploy:
    name: Deploy to VPS (QA)
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/Projects/dansar-backend
            git pull origin develop
            docker compose -f docker-compose.qa.yml --env-file .env.qa --project-name dansar-qa up -d --build --force-recreate
            docker compose -f docker-compose.qa.yml --env-file .env.qa --project-name dansar-qa exec -T backend-qa alembic upgrade head
            echo "QA deploy done"
