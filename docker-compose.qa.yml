services:
  db-qa:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dansar
      POSTGRES_PASSWORD: ${DB_PASSWORD_QA}
      POSTGRES_DB: dansar_qa
    volumes:
      - pgdata_qa:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dansar -d dansar_qa"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-qa:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file: .env.qa
    environment:
      DATABASE_URL: postgresql+asyncpg://dansar:${DB_PASSWORD_QA}@db-qa:5432/dansar_qa
    depends_on:
      db-qa:
        condition: service_healthy

volumes:
  pgdata_qa:
